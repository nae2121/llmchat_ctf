<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" type="text/css">
  <!-- ★ defer を付ける -->
   <script> 
    const IMG_URL = "{{ url_for('static', filename='img/') }}";
   </script>
  <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
  <title>prompt-leaking</title>
</head>
<body>
  <div class="app">
    <header class="card header">
      <div class="title">Let's talk to AI !</div>
    </header>

    <main id="chatBox" class="card chat-box" aria-live="polite" aria-label="チャット履歴">
      <div class="empty" id="emptyState">こんにちは！ 質問を入力して「送信」を押してください。</div>
    </main>

    <div class="card composer">
      <textarea id="messageInput" class="input" placeholder="メッセージを入力…（Shift+Enterで改行 / Enterで送信）" rows="1" maxlength="200"></textarea>
      <button id="sendBtn" class="send" aria-label="送信">送信</button>
      <div class="helper">
        <span id="charCount" class="limit">0/200</span>
        <span>※ モデルの返答は安全のためテキストとして表示します</span>
      </div>
    </div>
  </div>
</body>
</html>
